<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="format-detection" content="telephone=no">
  <meta name="theme-color" content="#1B2469">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="assets/icon-180.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap"
    rel="stylesheet">
  <title>Phiếu Cân Gas - Petrolimex</title>
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/form.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/confirm.css">
  <link rel="stylesheet" href="css/history.css">
  <link rel="stylesheet" href="css/toast.css">
  <link rel="stylesheet" href="css/responsive.css">
  <link rel="stylesheet" href="css/print.css">
</head>

<body>
  <div class="offline-bar" id="offlineBar">Không có kết nối mạng</div>

  <header class="app-header" role="banner">
    <img src="assets/logo-header.png" alt="Petrolimex" class="header-logo">
    <div class="header-text">
      <h1>PHIẾU CÂN GAS</h1>
      <p>Tại trạm nạp - Gas Petrolimex</p>
    </div>
  </header>

  <div class="summary-bar" id="summaryBar" role="status" aria-live="polite">
    <div class="summary-total">
      <span class="summary-label">Tổng gas tồn</span>
      <span class="summary-value" id="totalGas">0</span>
      <span class="summary-unit">kg</span>
    </div>
    <div class="summary-count">
      <span id="filledCount">0</span> / <span id="totalCount">40</span> bình
    </div>
  </div>

  <div class="form-meta no-print">
    <div class="meta-row">
      <label>Ngày lập phiếu</label>
      <div class="date-picker-vn">
        <div class="date-field">
          <span class="date-label">Ngày</span>
          <select id="formDay" aria-label="Ngày"></select>
        </div>
        <div class="date-field">
          <span class="date-label">Tháng</span>
          <select id="formMonth" aria-label="Tháng"></select>
        </div>
        <div class="date-field">
          <span class="date-label">Năm</span>
          <select id="formYear" aria-label="Năm"></select>
        </div>
      </div>
    </div>
    <div class="formula-hint" role="note">
      Gas tồn = Cân toàn bộ - Trọng lượng vỏ
    </div>
  </div>

  <div class="cylinder-list" id="cylinderList" role="list" aria-label="Danh sách bình gas"></div>

  <div class="add-row-wrap no-print">
    <button class="btn btn-add" onclick="addRow()" type="button">+ Thêm bình mới</button>
  </div>

  <hr class="section-divider no-print">

  <div class="auto-save-hint no-print" role="status" aria-live="polite">
    <span class="auto-save-dot"></span> Dữ liệu tự động lưu
  </div>

  <div class="actions no-print">
    <!-- Nhóm xem / xuất -->
    <div class="btn-row">
      <button class="btn btn-primary" onclick="showHistory()" type="button">Xem phiếu cũ</button>
      <button class="btn btn-install" onclick="exportCSV()" type="button">Tải file Excel</button>
    </div>

    <!-- Hành động in -->
    <button class="btn btn-secondary" onclick="printForm()" type="button">In phiếu ra giấy</button>

    <button class="btn btn-danger" onclick="clearAll()" type="button">Xóa hết, làm phiếu mới</button>

    <!-- Dev & install -->
    <button class="btn btn-dev" onclick="fillRandomData()" type="button">Điền dữ liệu test ngẫu nhiên</button>
    <button class="btn btn-dev" id="btnInstall" onclick="installApp()" type="button" style="display:none">Cài ứng dụng lên màn hình</button>
  </div>

  <div class="history-modal" id="historyModal" role="dialog" aria-label="Phiếu đã lưu">
    <div class="history-backdrop" onclick="closeHistory()"></div>
    <div class="history-panel">
      <div class="history-header">
        <h2>Phiếu đã lưu</h2>
        <button class="history-close" onclick="closeHistory()" type="button" aria-label="Đóng">&times;</button>
      </div>
      <div class="history-list" id="historyList"></div>
    </div>
  </div>

  <div class="print-view" id="printView"></div>
  <div class="toast" id="toast" role="alert" aria-live="assertive"></div>

  <!-- Fix #9: Custom confirm modal -->
  <div class="confirm-overlay" id="confirmOverlay" role="dialog" aria-modal="true" aria-labelledby="confirmMessage">
    <div class="confirm-box">
      <p class="confirm-message" id="confirmMessage"></p>
      <div class="confirm-actions">
        <button class="btn-confirm-cancel" id="confirmCancel" type="button">Hủy</button>
        <button class="btn-confirm-ok" id="confirmOk" type="button">Đồng ý</button>
      </div>
    </div>
  </div>

  <script type="module" src="js/main.js"></script>
</body>

</html>
